name: release-desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
      publish:
        description: "Publish GitHub Release"
        required: true
        default: false
        type: boolean

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release vars
        id: vars
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel }}"
          $version = "${{ inputs.version }}"
          $tag = if ($channel -eq "beta") { "v$version-beta" } else { "v$version" }
          $prerelease = if ($channel -eq "beta") { "true" } else { "false" }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install

      - name: Create engine venv
        shell: pwsh
        run: |
          python -m venv services\engine\.venv

      - name: Build engine sidecar
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\desktop\build_engine_sidecar.ps1 -Channel "${{ inputs.channel }}"

      - name: Build desktop bundles
        run: pnpm --filter @fxfr/desktop tauri:build

      - name: Verify and stage artifacts
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\desktop\verify_package_artifacts.ps1 -Channel "${{ inputs.channel }}" -Version "${{ inputs.version }}"

      - name: Generate channel manifest
        shell: pwsh
        run: |
          $channel = "${{ inputs.channel }}"
          $version = "${{ inputs.version }}"
          $tag = "${{ steps.vars.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $published = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            schema_version = "1.0.0"
            channel = $channel
            version = $version
            published_at_utc = $published
            assets = [ordered]@{
              nsis = "https://github.com/$repo/releases/download/$tag/fxfr-desktop-$version-$channel-nsis.exe"
              msi  = "https://github.com/$repo/releases/download/$tag/fxfr-desktop-$version-$channel-msi.msi"
            }
          }
          $manifestPath = Join-Path "artifacts" "latest-$channel.json"
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path $manifestPath -Encoding UTF8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fxfr-release-${{ inputs.channel }}-${{ inputs.version }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: FXFR ${{ inputs.version }} (${{ inputs.channel }})
          prerelease: ${{ steps.vars.outputs.prerelease }}
          files: |
            artifacts/fxfr-desktop-${{ inputs.version }}-${{ inputs.channel }}-nsis.exe
            artifacts/fxfr-desktop-${{ inputs.version }}-${{ inputs.channel }}-msi.msi
            artifacts/latest-${{ inputs.channel }}.json
